[build]
functions = "functions"

[build.environment]
NODE_VERSION = "22"

[[redirects]]
from = "/"
to = "/index.html"
status = 200

[[redirects]]
from = "/search"
to = "/index.html"
status = 200

[[redirects]]
from = "/settings"
to = "/index.html"
status = 200

[[redirects]]
from = "/moods"
to = "/index.html"
status = 200

[[redirects]]
from = "/history"
to = "/index.html"
status = 200

[[redirects]]
from = "/s/*"
to = "/index.html"
status = 200

[[redirects]]
from = "/legacy-search"
to = "/legacy/search"
status = 301

[[redirects]]
from = "/legacy-analyse"
to = "/legacy/analyse"
status = 301

[[redirects]]
from = "/legacy-recommendations"
to = "/legacy/recommendations"
status = 301

[[redirects]]
from = "/legacy-whats-new"
to = "/legacy/whats-new"
status = 301

# Video detail HTML under /legacy/videos/ must proxy to ThisVid before the SPA catch-all below.
[[redirects]]
from = "/legacy/videos/*"
to = "https://thisvid.com/legacy/videos/:splat"
status = 200

[[redirects]]
from = "/legacy/*"
to = "/index.html"
status = 200

[[redirects]]
from = "/newest/*"
to = "https://thisvid.com/newest/:splat"
status = 200

[[redirects]]
from = "/new-private/*"
to = "https://thisvid.com/new-private/:splat"
status = 200

[[redirects]]
from = "/gay-newest/*"
to = "https://thisvid.com/gay-newest/:splat"
status = 200

[[redirects]]
from = "/gay-private/*"
to = "https://thisvid.com/gay-private/:splat"
status = 200

[[redirects]]
from = "/members/*"
to = "https://thisvid.com/members/:splat"
status = 200

[[redirects]]
from = "/videos/*"
to = "https://thisvid.com/videos/:splat"
status = 200

[[redirects]]
from = "/categories/*"
to = "https://thisvid.com/categories/:splat"
status = 200

[[redirects]]
from = "/tags/*"
to = "https://thisvid.com/tags/:splat"
status = 200

[[redirects]]
from = "/female-extreme/*"
to = "https://thisvid.com/female-extreme/:splat"
status = 200

[[redirects]]
from = "/male-extreme/*"
to = "https://thisvid.com/male-extreme/:splat"
status = 200

[[redirects]]
from = "/getVideos"
to = "https://tvass.netlify.app/.netlify/functions/videos"
status = 200
  [redirects.rate_limit]
  window_limit = 300
  window_size = 60
  aggregate_by = ["ip", "domain"]

[[redirects]]
from = "/download"
to = "https://tvass.netlify.app/.netlify/functions/download"
status = 200
  [redirects.rate_limit]
  window_limit = 30
  window_size = 60
  aggregate_by = ["ip", "domain"]

[[redirects]]
from = "/friends"
to = "https://tvass.netlify.app/.netlify/functions/friends"
status = 200
  [redirects.rate_limit]
  window_limit = 120
  window_size = 60
  aggregate_by = ["ip", "domain"]

[[redirects]]
from = "/friendsEvents"
to = "https://tvass.netlify.app/.netlify/functions/friendsEvents"
status = 200
  [redirects.rate_limit]
  window_limit = 20
  window_size = 60
  aggregate_by = ["ip", "domain"]

[[redirects]]
from = "/videoDetails"
to = "https://tvass.netlify.app/.netlify/functions/videoDetails"
status = 200
  [redirects.rate_limit]
  window_limit = 200
  window_size = 60
  aggregate_by = ["ip", "domain"]

[[headers]]
for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' https: data: blob:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://thisvid.com https://randomuser.me https://ipapi.co https://api.ipify.org https://tvass.netlify.app; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
